system:
  name: "NexusQuant"
  version: "1.0.0"
  log_level: "INFO"
  cycle_interval_seconds: 300   # 5 minutes between full cycles

alpaca:
  base_url: "${ALPACA_BASE_URL}"
  data_url: "${ALPACA_DATA_URL}"
  api_key: "${ALPACA_API_KEY}"
  secret_key: "${ALPACA_SECRET_KEY}"

nexus:
  url: "http://localhost:3000"
  admin_token: "${NEXUS_ADMIN_TOKEN}"
  push_signals: true            # whether to POST signals to Node.js

risk:
  max_position_pct: 15.0        # max % of equity per position
  max_daily_loss_pct: 3.0       # kill switch: halt if daily loss exceeds
  max_drawdown_pct: 15.0        # halt if portfolio drawdown exceeds
  max_gross_exposure_pct: 150.0
  max_net_exposure_pct: 60.0
  var_confidence: 0.95
  var_horizon_days: 1
  kelly_fraction: 0.25          # fractional Kelly (25% of full Kelly)
  max_trades_per_day: 10
  min_buying_power: 500

signals:
  momentum_lookback: 20         # days for momentum calculation
  mean_reversion_window: 20     # z-score rolling window
  mean_reversion_entry_z: 2.0   # entry when |z| > this
  mean_reversion_exit_z: 0.5    # exit when |z| < this
  min_confidence: 0.60          # minimum signal confidence to pass to risk
  min_strength: 0.30            # minimum |signal strength|
  volume_confirmation: true     # require relative volume > 1.0 for entry

volatility:
  ewma_lambda: 0.94
  garch_horizon_days: 5
  history_window: 60            # bars of history for vol calculation
  iv_vs_rv_threshold: 0.10      # IV/RV ratio alert if diff > 10%

regime:
  vol_low_threshold: 0.15       # annualized — below = low vol regime
  vol_high_threshold: 0.35      # annualized — above = high vol regime
  vol_crisis_threshold: 0.55    # annualized — above = crisis
  trend_ma_fast: 20
  trend_ma_slow: 50
  drawdown_crisis_threshold: 0.10   # 10% drawdown from peak = crisis
  correlation_window: 30

  # which strategies are enabled per regime
  strategy_map:
    bull_trend:      ["momentum", "factor"]
    bear_trend:      ["momentum", "factor", "mean_reversion"]
    sideways:        ["mean_reversion", "pairs"]
    high_vol:        ["mean_reversion"]
    low_vol:         ["momentum", "pairs", "factor"]
    crisis:          []           # all strategies disabled in crisis

portfolio:
  max_positions: 15
  max_sector_pct: 30.0
  target_volatility: 0.15       # annualized portfolio vol target
  rebalance_threshold: 0.05     # rebalance if weight drifts > 5%
  min_weight: 0.02              # minimum position weight
  max_weight: 0.20              # maximum position weight

execution:
  slippage_pct: 0.05            # basis points as decimal (0.05 = 5bps)
  commission_pct: 0.001         # 0.1% per trade (Alpaca = $0 but model it)
  spread_pct: 0.0002            # estimated half-spread
  min_order_notional: 100
  max_retries: 3
  retry_delay_seconds: 2

options:
  risk_free_rate: 0.053          # US 3m T-bill approximation
  min_dte: 10                    # minimum days to expiration at entry
  max_dte: 45                    # maximum days to expiration at entry
  target_delta_short: 0.30       # target delta for short premium legs
  max_bid_ask_spread_pct: 0.08   # max (ask-bid)/mid per leg
  min_open_interest: 200         # minimum OI per leg
  max_bs_mispricing_pct: 0.35    # discard if market price deviates > 35% from BS
  iv_rank_low_threshold: 20      # below = IV too low for credit strategies
  iv_rank_high_threshold: 80     # above = IV extreme, reduce size
  earnings_blackout_dte: 5       # don't enter within N days of earnings
  enabled_strategies:
    - iron_condor
    - vertical_spread
    - cash_secured_put

backtest:
  start_date: "2023-01-01"
  end_date: "2024-12-31"
  initial_capital: 100000
  commission_pct: 0.001
  slippage_pct: 0.0005
  spread_pct: 0.0002
  latency_bars: 1               # simulate 1-bar execution delay

monitoring:
  sharpe_alert_threshold: -0.5
  drawdown_alert_pct: 5.0
  var_multiplier_alert: 1.5     # alert if live VaR > 1.5x backtest VaR
  win_rate_alert: 0.35
  slippage_alert_multiplier: 2.0
  expectancy_alert: 0.0
  rolling_window_days: 20       # rolling window for live KPIs
